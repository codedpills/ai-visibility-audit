name: Bug report
description: Something isn't working as expected
title: '[Bug] '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as you can.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the bug…
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
      placeholder: I expected…
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened instead?
      placeholder: Instead, I saw…
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or error messages
      description: If applicable, paste error messages or drag-and-drop screenshots here.
      placeholder: Paste errors or attach a screenshot…

  - type: input
    id: url-audited
    attributes:
      label: URL audited (if relevant)
      description: The URL you were auditing when the bug occurred.
      placeholder: https://example.com

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
        - Other
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Desktop
        - Mobile
        - Tablet
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Anything else?
      description: Any other context that might help us investigate.
      placeholder: Add any extra context here…
