<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Content Security Policy -->
    <!-- default-src: only our own origin + Railway API.
         script-src: self + inline scripts needed by Vite/React, unsafe-eval for dev.
         style-src:  self + inline styles (React / CSS-in-JS).
         img-src:    self + data URIs (favicons, base64 images).
         connect-src: self + API + Ko-fi for donation widget.
         font-src:   self + Google Fonts (Inter).
         frame-ancestors: 'none' prevents clickjacking.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        img-src 'self' data: https:;
        font-src 'self' https://fonts.gstatic.com;
        connect-src 'self' https://api-production-a8f8.up.railway.app https://storage.ko-fi.com https://us.i.posthog.com https://us-assets.i.posthog.com;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
      "
    />

    <!-- Primary meta -->
    <title>AI Visibility Audit — Free GEO Score Checker</title>
    <meta
      name="description"
      content="Find out if your website is invisible to AI chatbots like ChatGPT, Claude, and Gemini. Get a free GEO score in 60 seconds. No signup required."
    />
    <link rel="canonical" href="https://aivisibilityaudit.cc/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logos/AVA_icon.png" />
    <link rel="apple-touch-icon" href="/logos/AVA_icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aivisibilityaudit.cc/" />
    <meta
      property="og:title"
      content="AI Visibility Audit — Free GEO Score Checker"
    />
    <meta
      property="og:description"
      content="Find out if your website is invisible to AI chatbots. Free 8-category GEO audit in 60 seconds. No signup required."
    />
    <meta property="og:site_name" content="AI Visibility Audit" />
    <meta
      property="og:image"
      content="https://aivisibilityaudit.cc/logos/AVA_icon.png"
    />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="AI Visibility Audit logo" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="AI Visibility Audit — Free GEO Score Checker"
    />
    <meta
      name="twitter:description"
      content="Find out if your website is invisible to AI chatbots. Free 8-category GEO audit in 60 seconds."
    />
    <meta
      name="twitter:image"
      content="https://aivisibilityaudit.cc/logos/AVA_icon.png"
    />
    <meta name="twitter:image:alt" content="AI Visibility Audit logo" />

    <!-- Indexing -->
    <meta name="robots" content="index, follow" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "AI Visibility Audit",
        "url": "https://aivisibilityaudit.cc",
        "description": "Free tool to audit website visibility to AI chatbots using Generative Engine Optimisation (GEO) signals across 8 categories"
      }
    </script>

    <!-- JSON-LD: WebApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "AI Visibility Audit",
        "url": "https://aivisibilityaudit.cc",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "description": "Audit your website's GEO score across 8 categories and get prioritised recommendations to improve AI chatbot discoverability",
        "featureList": [
          "Entity Definition scoring",
          "Content Clarity scoring",
          "Topic Authority scoring",
          "Semantic Structure scoring",
          "Structured Data scoring",
          "AI Crawlability scoring",
          "Brand Authority scoring",
          "AI Answerability scoring"
        ]
      }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is GEO (Generative Engine Optimisation)?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "GEO is the practice of optimising your website so AI language models — ChatGPT, Claude, Gemini — can understand, cite, and recommend your content. Unlike traditional SEO, GEO focuses on how AI systems extract and interpret information from your pages."
            }
          },
          {
            "@type": "Question",
            "name": "How is the GEO score calculated?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Your score is calculated across 8 categories: Entity Definition (15 pts), Content Clarity (15 pts), Topic Authority (15 pts), Brand Authority (15 pts), Semantic Structure (10 pts), Structured Data (10 pts), AI Crawlability (10 pts), and AI Answerability (10 pts)."
            }
          },
          {
            "@type": "Question",
            "name": "Is this tool really free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. AI Visibility Audit is completely free. Anonymous visitors can run 1 audit per day. Registered users (email only, no password) can run up to 3 per month and keep results for 30 days. The project is donation-supported via Ko-fi."
            }
          },
          {
            "@type": "Question",
            "name": "What AI systems is this optimised for?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The audit analyses signals relevant to all major AI systems: ChatGPT (OpenAI), Claude (Anthropic), Gemini (Google), and Perplexity AI. The AI Crawlability category checks whether GPTBot, ClaudeBot, PerplexityBot, and Google-Extended are permitted in your robots.txt."
            }
          },
          {
            "@type": "Question",
            "name": "How many pages does it crawl?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The tool crawls up to 10 pages from your domain, always respecting your robots.txt. It analyses GEO signals from all crawled pages and aggregates them into a final score."
            }
          }
        ]
      }
    </script>

    <!-- JSON-LD: HowTo -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "HowTo",
        "name": "How to audit your website's AI visibility",
        "description": "Run a free GEO audit to find out how well AI chatbots can discover and cite your website",
        "totalTime": "PT1M",
        "estimatedCost": {
          "@type": "MonetaryAmount",
          "currency": "USD",
          "value": "0"
        },
        "step": [
          {
            "@type": "HowToStep",
            "name": "Enter your website URL",
            "text": "Paste your website's URL into the audit form. No account needed."
          },
          {
            "@type": "HowToStep",
            "name": "Wait for the crawl",
            "text": "The tool crawls up to 10 pages and runs 8 GEO signal analysers. Usually takes 30–60 seconds."
          },
          {
            "@type": "HowToStep",
            "name": "Review your GEO score",
            "text": "Get your score out of 100 with a breakdown across all 8 categories."
          },
          {
            "@type": "HowToStep",
            "name": "Fix what matters",
            "text": "Submit your email to unlock the full prioritised recommendation list with specific fixes and code snippets."
          }
        ]
      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- app-html placeholder is replaced with pre-rendered HTML by scripts/prerender.mjs at build time -->
    <div id="root"><!--app-html--></div>
    <!-- Runtime config injected at container start; overrides build-time VITE_API_URL -->
    <script src="/env-config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
